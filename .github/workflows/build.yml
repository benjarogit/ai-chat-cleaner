name: Build extensions

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build all targets
        run: npm run build

      - name: Verify artifacts
        run: |
          test -f dist/claude-deleter-chrome.zip
          test -f dist/claude-deleter-firefox.zip
          test -f dist/claude-deleter-edge.zip
          test -f dist/console-deleter.js
          test -f dist/bookmarklet.txt
          unzip -l dist/claude-deleter-chrome.zip | grep manifest.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: claude-deleter-build
          path: |
            dist/*.zip
            dist/console-deleter.js
            dist/bookmarklet.txt
            dist/*README.txt
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/claude-deleter-chrome.zip
            dist/claude-deleter-firefox.zip
            dist/claude-deleter-edge.zip
            dist/console-deleter.js
            dist/bookmarklet.txt
            dist/CONSOLE-README.txt
            dist/SAFARI-README.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
